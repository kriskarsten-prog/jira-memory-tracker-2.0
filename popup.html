<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>Jira Memory Tracker</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header>
      <div class="logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="7" height="7" rx="1" fill="currentColor"/>
          <rect x="14" y="3" width="7" height="7" rx="1" fill="currentColor" opacity="0.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1" fill="currentColor" opacity="0.5"/>
          <rect x="14" y="14" width="7" height="7" rx="1" fill="currentColor"/>
        </svg>
        <span>Jira Tracker</span>
      </div>
      <div class="tabs">
        <button class="tab active" data-tab="current">Current</button>
        <button class="tab" data-tab="recent">Recent</button>
      </div>
    </header>

    <!-- Current Ticket Tab -->
    <div id="tab-current" class="tab-content active">
      <div id="no-ticket" class="empty-state" style="display:none">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <p>Open a Jira ticket to start tracking</p>
      </div>

      <div id="ticket-panel" style="display:none">
        <!-- Ticket Header -->
        <div class="ticket-header">
          <a id="ticket-id" href="#" target="_blank" class="ticket-id-link"></a>
          <span id="ticket-status" class="status-badge"></span>
        </div>
        <p id="ticket-title" class="ticket-title"></p>

        <!-- Meta row -->
        <div class="meta-row" id="meta-row">
          <span class="meta-item" id="meta-assignee" style="display:none">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/></svg>
            <span id="assignee-text"></span>
          </span>
          <span class="meta-item" id="meta-priority" style="display:none">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
            <span id="priority-text"></span>
          </span>
          <span class="meta-item" id="meta-points" style="display:none">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M12 8v4l3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <span id="points-text"></span>
          </span>
        </div>

        <div class="divider"></div>

        <!-- Progress tracker -->
        <div class="section">
          <label class="section-label">My Progress</label>
          <div class="progress-options">
            <button class="progress-btn" data-value="not-started">Not Started</button>
            <button class="progress-btn" data-value="in-progress">In Progress</button>
            <button class="progress-btn" data-value="blocked">Blocked</button>
            <button class="progress-btn" data-value="done">Done</button>
          </div>
        </div>

        <!-- Private notes -->
        <div class="section">
          <label class="section-label">Private Notes</label>
          <textarea id="ticket-notes" placeholder="Add private notes, context, blockers…" rows="4"></textarea>
          <div class="save-row">
            <span id="save-status" class="save-status"></span>
            <button id="save-btn" class="save-btn">Save</button>
          </div>
        </div>

        <!-- Last visited -->
        <div class="last-visited">
          <span id="last-visited-text"></span>
        </div>
      </div>
    </div>

    <!-- Recent Tickets Tab -->
    <div id="tab-recent" class="tab-content">
      <div id="recent-empty" class="empty-state" style="display:none">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <p>No tickets tracked yet</p>
      </div>
      <div id="recent-list"></div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
